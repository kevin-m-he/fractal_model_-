<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="monospace">
<rect width="800" height="300" fill="#0E1220"/>
<text x="24" y="40" fill="#E8C400" font-size="20" font-weight="bold" letter-spacing="3">FRACTAL<tspan fill="#F2E9DC" font-weight="300">MODEL</tspan></text>
<text x="24" y="60" fill="#6B7488" font-size="11">a pattern that magnifies over time hides in plain sight</text>
<polyline fill="none" stroke="#7FB4E6" stroke-width="1.6" points="40,240 70,235 90,245 110,210 130,225 150,200 165,215 180,180 210,235 240,220 270,150 300,190 330,90 360,140 400,60 440,120 490,40"/>
<rect x="55" y="200" width="120" height="50" fill="none" stroke="#2E9E5B" stroke-width="2"/>
<rect x="250" y="120" width="180" height="90" fill="none" stroke="#2E9E5B" stroke-width="2" stroke-dasharray="4"/>
<rect x="80" y="205" width="55" height="40" fill="none" stroke="#E8C400" stroke-width="1.5"/>
<rect x="300" y="60" width="140" height="130" fill="none" stroke="#E8C400" stroke-width="1.5" stroke-dasharray="4"/>
<text x="500" y="130" fill="#6B7488" font-size="11">same shape,</text>
<text x="500" y="146" fill="#6B7488" font-size="11">larger amplitude,</text>
<text x="500" y="162" fill="#6B7488" font-size="11">longer duration</text>
<text x="500" y="184" fill="#F2E9DC" font-size="12">a_p =~ a_t^H</text>
</svg>
